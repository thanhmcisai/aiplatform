service: "service:CVDetector"
labels:
  team: cv-mlops
  stage: production
include:
  - "service.py"
python:
  packages:
    - ultralytics>=8.3.0
    - mlflow>=2.16.0
    - boto3>=1.34.0
    - pillow>=10.0.0
envs:
  - name: MLFLOW_TRACKING_URI
    value: "http://mlflow:5000"
  - name: MODEL_NAME
    value: "cv-detector"
  - name: MODEL_STAGE
    value: "Production"
