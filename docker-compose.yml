# =============================================================
#  CV MLOps Stack — Computer Vision, single-server Docker Compose
#  Components: CVAT · MinIO · MLflow · PostgreSQL · Dashboard
# =============================================================
name: cv-mlops

x-restart: &restart
  restart: unless-stopped

services:
  # ---------------------------------------------------------
  # PostgreSQL — metadata backend for MLflow & CVAT
  # ---------------------------------------------------------
  postgres:
    <<: *restart
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-mlops}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-mlops_pw}
      POSTGRES_MULTIPLE_DATABASES: mlflow,cvat,keycloak
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # MinIO — S3-compatible object storage
  #   Buckets: datasets (DVC remote) · mlflow (artifacts)
  # ---------------------------------------------------------
  minio:
    <<: *restart
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # One-shot job: create buckets on first boot
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin};
      mc mb -p local/datasets;
      mc mb -p local/mlflow;
      mc mb -p local/models;
      echo 'Buckets ready';
      "

  # ---------------------------------------------------------
  # MLflow — experiment tracking + model registry
  # ---------------------------------------------------------
  mlflow:
    <<: *restart
    image: ghcr.io/mlflow/mlflow:v2.16.2
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin}
    command: >
      sh -c "pip install psycopg2-binary boto3 &&
      mlflow server
      --backend-store-uri postgresql://${PG_USER:-mlops}:${PG_PASSWORD:-mlops_pw}@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0 --port 5000"
    expose:
      - "5000"

  # ---------------------------------------------------------
  # model-api — lớp REST tối thiểu bọc MLflow (cho hệ thống khác)
  #   MLflow lui về backend; đây là API duy nhất bên ngoài thấy.
  # ---------------------------------------------------------
  model-api:
    <<: *restart
    build: ./model-api
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      BENTOML_URL: http://bentoml:3000
    ports:
      - "8500:8500"

  # ---------------------------------------------------------
  # bentoml — BentoML serving (CVDetector): REST inference cho route /api.
  #   Nạp model Production từ MLflow Registry (artifact trên MinIO) và tự
  #   reload khi promote. Gateway proxy /api/* → bentoml:3000 (mở, máy-gọi-máy).
  #   Chưa có model Production thì service vẫn chạy (Swagger UI + /health),
  #   chỉ /predict báo lỗi cho tới khi promote một version lên Production.
  # ---------------------------------------------------------
  bentoml:
    <<: *restart
    build: ./serving
    depends_on:
      - mlflow
      - minio
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin}
      MODEL_NAME: cv-detector
      MODEL_STAGE: Production
      RELOAD_INTERVAL: "300"
    expose:
      - "3000"

  # ---------------------------------------------------------
  # minio-api — REST + UI duyệt dữ liệu (bọc S3 API)
  # ---------------------------------------------------------
  minio-api:
    <<: *restart
    build: ./minio-api
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "8600:8600"

  # ---------------------------------------------------------
  # kc-admin-api — REST + UI quản lý user (bọc Keycloak Admin API)
  # ---------------------------------------------------------
  kc-admin-api:
    <<: *restart
    build: ./kc-admin-api
    depends_on:
      - keycloak
    environment:
      KC_URL: http://keycloak:8080/auth
      KC_ADMIN: ${KC_ADMIN:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin_pw}
      KC_REALM: mlops
    ports:
      - "8700:8700"

  # ---------------------------------------------------------
  # dataset-api — quản lý dataset đúng nghĩa: liệt kê các bộ dữ
  #   liệu, version, số ảnh, class, lịch sử train. Gom MinIO + MLflow.
  # ---------------------------------------------------------
  dataset-api:
    <<: *restart
    build: ./dataset-api
    depends_on:
      - minio
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin}
      DATASET_BUCKET: datasets
    ports:
      - "8400:8400"

  # ---------------------------------------------------------
  # simple-label — gán nhãn đơn giản cho người không quen CVAT.
  #   Một màn vẽ box, lưu thẳng YOLO vào MinIO, dataset xuất hiện ngay.
  # ---------------------------------------------------------
  simple-label:
    <<: *restart
    build: ./simple-label
    depends_on:
      - minio
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin}
      DATASET_BUCKET: datasets
    ports:
      - "8300:8300"

  # ---------------------------------------------------------
  # trainer-api — trigger train/export bất đồng bộ + UI theo dõi job
  #   Mount training/ + workspace để chạy script. Cần GPU để train thật
  #   (thêm 'deploy.resources.reservations.devices' cho nvidia nếu có).
  # ---------------------------------------------------------
  trainer-api:
    <<: *restart
    build: ./trainer-api
    depends_on:
      - mlflow
      - minio
    environment:
      REPO_DIR: /workspace
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin}
      CVAT_URL: http://cvat-ui:80
      CVAT_USER: ${CVAT_ADMIN_USER:-admin}
      CVAT_PASSWORD: ${CVAT_ADMIN_PASSWORD:-admin_pw}
      BENTOML_URL: http://bentoml:3000
    volumes:
      # Mount mã train + thư mục dataset dùng chung để job chạy được
      - ./training:/workspace/training
      - ./base-models:/workspace/base-models
      - trainer_workspace:/workspace/data
    ports:
      - "8800:8800"
    # GPU: bỏ comment nếu máy có nvidia-docker
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ---------------------------------------------------------
  # wizard — trang chủ thân thiện cho người không rành AI.
  #   Dẫn dắt theo mục tiêu, gọi lại các API có sẵn ở hậu trường.
  # ---------------------------------------------------------
  wizard:
    <<: *restart
    build: ./wizard
    depends_on:
      - trainer-api
      - minio-api
      - model-api
    environment:
      TRAINER_URL: http://trainer-api:8800
      MINIO_API_URL: http://minio-api:8600
      MODEL_API_URL: http://model-api:8500
    ports:
      - "8900:8900"

  # ---------------------------------------------------------
  # CVAT — annotation server (server + UI + DB deps bundled)
  #   We point CVAT at our shared postgres + minio.
  # ---------------------------------------------------------
  cvat-redis:
    <<: *restart
    image: redis:7-alpine
    volumes:
      - cvat_redis:/data

  # Redis-bền (kvrocks) cho CVAT: cache chunk + lock. cvat-server kiểm tra nó
  # ở /api/server/health/ — THIẾU service này thì health-check 500 và giao diện
  # báo "Cannot connect to the server" dù backend khác vẫn chạy. Cổng mặc định 6666.
  cvat-redis-ondisk:
    <<: *restart
    image: apache/kvrocks:2.7.0
    init: true
    command: ["--dir", "/var/lib/kvrocks/data"]
    volumes:
      - cvat_cache_db:/var/lib/kvrocks/data

  cvat-server:
    <<: *restart
    image: cvat/server:v2.20.0
    command: init run server
    depends_on:
      postgres:
        condition: service_healthy
      cvat-redis:
        condition: service_started
      cvat-redis-ondisk:
        condition: service_started
    environment:
      CVAT_POSTGRES_HOST: postgres
      CVAT_POSTGRES_PORT: "5432"
      CVAT_POSTGRES_DBNAME: cvat
      CVAT_POSTGRES_USER: ${PG_USER:-mlops}
      CVAT_POSTGRES_PASSWORD: ${PG_PASSWORD:-mlops_pw}
      CVAT_REDIS_INMEM_HOST: cvat-redis
      CVAT_REDIS_INMEM_PORT: "6379"
      CVAT_REDIS_ONDISK_HOST: cvat-redis-ondisk
      CVAT_REDIS_ONDISK_PORT: "6666"
      # 'cvat-server' BẮT BUỘC có mặt: OPA kéo bundle qua Host: cvat-server:8080.
      # Thêm host public để trình duyệt truy cập :8080 không bị DisallowedHost.
      ALLOWED_HOSTS: "cvat-server,localhost,127.0.0.1,${PUBLIC_HOST:-localhost}"
      CVAT_HOST: ${PUBLIC_HOST:-localhost}
      CVAT_BASE_URL: http://${PUBLIC_HOST:-localhost}:8080
      SMOKESCREEN_OPTS: ""
      ADAPTIVE_AUTO_ANNOTATION: "false"
      DJANGO_SUPERUSER_USERNAME: ${CVAT_ADMIN_USER:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${CVAT_ADMIN_PASSWORD:-admin_pw}
      DJANGO_SUPERUSER_EMAIL: admin@example.com
    volumes:
      - cvat_data:/home/django/data
      - cvat_keys:/home/django/keys
      - cvat_logs:/home/django/logs

  # OPA — Open Policy Agent: CVAT gọi sang để kiểm tra quyền (IAM).
  #   cvat-server hardcode IAM_OPA_HOST=http://opa:8181, nên service PHẢI
  #   tên 'opa'. Thiếu nó thì mọi API permission-check trả 500.
  #   OPA tự kéo "bundle" rego từ cvat-server tại /api/auth/rules.
  opa:
    <<: *restart
    image: openpolicyagent/opa:0.63.0
    depends_on:
      - cvat-server
    command:
      - run
      - --server
      - --log-level=error
      - --set=services.cvat.url=http://cvat-server:8080
      - --set=bundles.cvat.service=cvat
      - --set=bundles.cvat.resource=/api/auth/rules
      - --set=bundles.cvat.polling.min_delay_seconds=5
      - --set=bundles.cvat.polling.max_delay_seconds=15

  cvat-ui:
    <<: *restart
    image: cvat/ui:v2.20.0
    depends_on:
      - cvat-server
    # Không phơi cổng host trực tiếp nữa: gateway nghe :8080 và tự chia route
    # /api → cvat-server, còn lại → cvat-ui (image này không proxy /api).
    expose:
      - "80"
    environment:
      CVAT_UI_HOST: ${PUBLIC_HOST:-localhost}
    volumes:
      # Đè index.html để nạp thêm lớp dịch tiếng Việt (/i18n/cvat-vi.js do
      # gateway phục vụ). LƯU Ý: bản này gắn với hash asset của cvat/ui:v2.20.0;
      # nếu nâng cấp image CVAT, xuất lại file: docker exec ... cat index.html.
      - ./gateway/cvat/cvat-index.html:/usr/share/nginx/html/index.html:ro

  # ---------------------------------------------------------
  # Management Dashboard — single pane of glass (FastAPI)
  # ---------------------------------------------------------
  dashboard:
    <<: *restart
    build: ./dashboard
    depends_on:
      - mlflow
      - minio
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      # Mở CVAT qua trang trung gian auto-login (cùng origin :8080)
      CVAT_URL: http://${PUBLIC_HOST:-localhost}:8080/auto-login
      # Trang huấn luyện model (trainer-api) qua gateway
      TRAIN_URL: http://${PUBLIC_HOST:-localhost}:${GATEWAY_PORT:-8090}/train/
      MLFLOW_UI_URL: http://${PUBLIC_HOST:-localhost}:${GATEWAY_PORT:-8090}/models/
      MINIO_UI_URL: http://${PUBLIC_HOST:-localhost}:${GATEWAY_PORT:-8090}/minio/
      BENTOML_URL: http://${PUBLIC_HOST:-localhost}:${GATEWAY_PORT:-8090}/api
    ports:
      - "8001:8000"

  # ---------------------------------------------------------
  # Keycloak — trung tâm danh tính (SSO), tự import realm
  # ---------------------------------------------------------
  keycloak:
    <<: *restart
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin_pw}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${PG_USER:-mlops}
      KC_DB_PASSWORD: ${PG_PASSWORD:-mlops_pw}
      KC_HOSTNAME: http://${PUBLIC_HOST:-localhost}:${GATEWAY_PORT:-8090}/auth
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      # Truyền vào để realm-mlops.json thay biến ${PUBLIC_HOST}/${GATEWAY_PORT} khi import
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      GATEWAY_PORT: ${GATEWAY_PORT:-8090}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./sso/keycloak:/opt/keycloak/data/import:ro
      - ./sso/themes:/opt/keycloak/themes:ro
    ports:
      - "8180:8080"

  # ---------------------------------------------------------
  # oauth2-proxy — chốt chặn xác thực trước mọi service
  # ---------------------------------------------------------
  oauth2-proxy:
    <<: *restart
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    depends_on:
      - keycloak
    command:
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --provider=keycloak-oidc
      - --oidc-issuer-url=http://keycloak:8080/auth/realms/mlops
      - --insecure-oidc-skip-issuer-verification=true
      - --client-id=oauth2-proxy
      - --client-secret=${OAUTH2_PROXY_SECRET:-oauth2-proxy-secret-CHANGE-ME}
      - --cookie-secret=${COOKIE_SECRET:-0123456789abcdef0123456789abcdef}
      - --email-domain=*
      - --upstream=static://202
      - --skip-provider-button=true
      - --cookie-secure=false
      - --whitelist-domain=localhost
      - --whitelist-domain=localhost:8090
      - --whitelist-domain=${PUBLIC_HOST:-localhost}:${GATEWAY_PORT:-8090}
    ports:
      - "4180:4180"

  # ---------------------------------------------------------
  # Gateway — Caddy reverse proxy: gom mọi UI về 1 cổng (80)
  #   + shell hợp nhất (sidebar + iframe) + chặn SSO
  # ---------------------------------------------------------
  gateway:
    <<: *restart
    image: caddy:2-alpine
    depends_on:
      - dashboard
      - mlflow
      - minio
      - cvat-ui
      - cvat-server
      - oauth2-proxy
    environment:
      # Dùng trong Caddyfile ({env.PUBLIC_HOST}) để redirect /cvat/ sang :8080
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./gateway/shell:/srv/shell:ro
      - ./gateway/cvat:/srv/cvat:ro
      - ./sso/cvat-i18n:/srv/i18n:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "${GATEWAY_PORT:-8090}:80"
      # Origin CVAT (UI + API + auto-login) — xem site :8080 trong Caddyfile
      - "8080:8080"

volumes:
  pg_data:
  minio_data:
  cvat_redis:
  cvat_cache_db:
  cvat_data:
  cvat_keys:
  cvat_logs:
  caddy_data:
  caddy_config:
  trainer_workspace:
