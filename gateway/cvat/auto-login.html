<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đang mở CVAT…</title>
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#0f1115;color:#e7e9ee}
  .box{text-align:center}
  .spin{width:38px;height:38px;border:3px solid #2a2f3a;border-top-color:#1a73e8;
    border-radius:50%;margin:0 auto 16px;animation:r .8s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .msg{font-size:15px;color:#aab1c0}
  .err{color:#ff6b6b;font-size:13px;margin-top:10px;max-width:380px}
  a{color:#1a73e8}
</style>
</head>
<body>
<div class="box">
  <div class="spin" id="spin"></div>
  <div class="msg" id="msg">Đang đăng nhập CVAT…</div>
  <div class="err" id="err"></div>
</div>
<script>
// Trang phục vụ cùng origin với CVAT (:8080) nên POST /api/auth/login sẽ set
// cookie phiên (sessionid) đúng origin; sau đó về "/" là SPA đã đăng nhập.
// Tài khoản dùng chung cố định (theo .env). Đây là auto-login client-side.
const USER = "admin";
const PASS = "admin_pw";

function fail(detail){
  document.getElementById("spin").style.display="none";
  document.getElementById("msg").textContent="Không tự đăng nhập được CVAT";
  const e=document.getElementById("err");
  e.innerHTML=(detail?detail+"<br>":"")+'<a href="/">Mở CVAT và đăng nhập thủ công</a>';
}

// Nếu trang này bị NHÚNG trong iframe (studio shell / dashboard ở cổng 8090),
// thoát ra tab top-level trước. CVAT là app full-page và phiên đăng nhập cần
// là first-party để cookie sessionid chắc chắn được set (tránh mọi vấn đề
// cookie trong ngữ cảnh nhúng). Ghi window.top.location được phép cross-origin.
if (window.top !== window.self) {
  window.top.location.replace(window.location.href);
} else {
(async () => {
  try{
    const r = await fetch("/api/auth/login", {
      method:"POST", credentials:"include",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({username: USER, password: PASS})
    });
    if(r.ok){ location.replace("/"); return; }
    // Đã có phiên trước đó? thử vào thẳng.
    if(r.status===403){ location.replace("/"); return; }
    let d=""; try{ d=JSON.stringify(await r.json()); }catch(_){}
    fail("Mã lỗi "+r.status+(d?": "+d:""));
  }catch(err){ fail(String(err)); }
})();
}
</script>
</body>
</html>
